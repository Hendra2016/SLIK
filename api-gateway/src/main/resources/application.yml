server:
  port: ${SERVER_PORT:8080}
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
    io.github.resilience4j: DEBUG

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ${GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Request-Id
              - web-creden
            exposedHeaders:
              - X-Request-Id
              - web-creden
      routes:
        - id: reporting
          uri: ${REPORTING_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/bank-core/a01/**,/bank-core/d01/**,/bank-core/d02/**,/bank-core/f01/**,/bank-core/f03/**,/bank-core/f04/**,/bank-core/f05/**,/bank-core/f06/**,/bank-core/k01/**,/bank-core/m01/**,/bank-core/p01/**,/bank-core/cron/**,/bank-core/poscd/**
          filters:
            - name: CircuitBreaker
              args:
                name: gatewayCb
                fallbackUri: forward:/fallback/unavailable
        - id: bank-core
          uri: ${LEGACY_BANK_CORE_URL:http://localhost:8082}
          predicates:
            - Path=/bank-core/**,/legacy/bank-core/**
          filters:
            - RewritePath=/legacy/bank-core/(?<segment>.*), /bank-core/${segment}
            - name: CircuitBreaker
              args:
                name: gatewayCb
                fallbackUri: forward:/fallback/unavailable

management:
  endpoints:
    web:
      exposure:
        include: ${GATEWAY_MANAGEMENT_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

gateway:
  auth:
    identity-service-url: ${IDENTITY_SERVICE_URL:http://localhost:8086}
    whitelist:
        - /bank-core/login
        - /actuator
        - /fallback

resilience4j:
  circuitbreaker:
    instances:
      gatewayCb:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s

