server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: identity-service

legacy:
  bank-core:
    base-url: ${LEGACY_BANK_CORE_BASE_URL:http://localhost:8082/bank-core/}
  identity:
    allowed-pattern: ${LEGACY_IDENTITY_ALLOWED_PATTERN:^(login|menu|bankuser)$}

auth:
  validate:
    probe-path: ${AUTH_VALIDATE_PROBE_PATH:auth/validate}

client:
  legacy:
    connect-timeout-ms: ${LEGACY_CLIENT_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${LEGACY_CLIENT_READ_TIMEOUT_MS:3000}

management:
  endpoints:
    web:
      exposure:
        include: ${IDENTITY_MANAGEMENT_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
bank-core:
  url: http://localhost:8082

jwt:
  secret: N7jz2QmG9mP8L8v2m3eP4Jj6sVYb3x7aK9o1L5P2Q4U=
  expiration: 3600000

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.web: TRACE